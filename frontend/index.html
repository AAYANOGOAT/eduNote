<!DOCTYPE html>
<html lang="fr">
<head>

  <title>EduNotes — Gestion des Notes Scolaires</title>
  <meta name="description" content="Plateforme de gestion des notes scolaires basée sur une architecture microservices — EduNotes">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
